<!doctype html>
<!--
The briarthorn.game entry page for the WebAssembly build. Ported from the
original emscripten-style shell onto Qt for WebAssembly's loading flow: Qt does
not use Module.canvas — qtloader.js's qtLoad() maps container elements to
QScreens and the app renders inside the #screen div below, which is what keeps
the game self-contained in a bounded view within the page.

Self-contained by design: styling is inline, the icon is a data URI, and the
only files referenced are the bundle's own briarthorn.js/.wasm + qtloader.js,
so the installed web/ directory can be served as-is on briarthorn.game (or the
page iframed into it).
-->
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- 1:1 mapping between CSS pixels and Qt device independent pixels on
         mobile, as in Qt's generated page. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>
    <!-- Application icon shown in the browser tab. Embedded as a data URI so it
         travels with the page regardless of where the .html is served from.
         Source of truth: assets/icon/briarthorn.svg. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSI+DQogIDxjaXJjbGUgY3g9IjMyIiBjeT0iMzIiIHI9IjMwIiBmaWxsPSIjMGQxODIwIiBzdHJva2U9IiMzZmI4YjMiIHN0cm9rZS13aWR0aD0iMiIvPg0KICA8Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjM2ZiOGIzIiBzdHJva2Utd2lkdGg9IjEiIG9wYWNpdHk9IjAuNSIvPg0KICA8Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIxMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjM2ZiOGIzIiBzdHJva2Utd2lkdGg9IjEiIG9wYWNpdHk9IjAuNCIvPg0KICA8cGF0aCBkPSJNMzIgMTYgTDMyIDQ4IE0xNiAzMiBMNDggMzIiIHN0cm9rZT0iIzNmYjhiMyIgc3Ryb2tlLXdpZHRoPSIwLjc1IiBvcGFjaXR5PSIwLjM1Ii8+DQogIDxwYXRoIGQ9Ik0zMiAyMiBMNDAgNDQgTDMyIDM4IEwyNCA0NCBaIiBmaWxsPSIjM2ZiOGIzIi8+DQo8L3N2Zz4NCg==">
    <title>Briarthorn</title>
    <style>
      /* Palette mirrors https://briarthorn.game/ (dark theme, teal accent). */
      :root {
        color-scheme: dark;
        --bg: #0b141b;          /* page background        */
        --bg-deep: #050a0f;     /* deepest surface        */
        --surface: #152029;     /* elevated surface       */
        --border: #243641;      /* hairline borders       */
        --text: #e6edee;        /* primary text           */
        --text-muted: #95a4ad;  /* secondary text         */
        --accent: #3fb8b3;      /* teal primary accent    */
        --accent-ink: #06181a;  /* text on the teal accent*/
      }

      body {
        margin: 0;
        padding: 16px;
        background-color: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      /* The game view: a bounded, bordered surface the app renders inside —
         4:3 to match the app's 800×600 window, centered, capped for large
         screens. #screen is the container qtLoad maps to a QScreen; the app
         (maximized on wasm) fills it exactly. */
      .view {
        position: relative;
        max-width: 1024px;
        aspect-ratio: 4 / 3;
        margin: 0 auto;
        border: 1px solid var(--border);
        background: var(--bg-deep);
      }
      /* Fullscreen drops the frame and lets the view fill the display; Qt
         follows the container's size automatically. */
      .view:fullscreen {
        max-width: none;
        aspect-ratio: auto;
        border: none;
      }
      #screen { display: none; width: 100%; height: 100%; }

      /* The loading overlay: spinner, status line and progress bar centered in
         the view until the app is up. */
      #loader {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
      }
      #loader strong { color: var(--accent); }
      #status { color: var(--text-muted); }
      #progress { accent-color: var(--accent); width: 60%; max-width: 420px; }

      .spinner {
        height: 50px;
        width: 50px;
        animation: rotation 0.8s linear infinite;
        border-left: 6px solid var(--accent);
        border-right: 6px solid var(--accent);
        border-bottom: 6px solid var(--accent);
        border-top: 6px solid var(--border);
        border-radius: 100%;
        background-color: transparent;
      }
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Site-style primary button for the Fullscreen control. */
      .controls { text-align: center; margin-top: 12px; }
      input[type="button"] {
        background: var(--accent);
        color: var(--accent-ink);
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 6px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      input[type="button"]:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body onload="init()">
    <div class="view" id="view">
      <div id="loader">
        <div class="spinner"></div>
        <strong>Briarthorn</strong>
        <div id="status">Downloading&hellip;</div>
        <progress value="0" max="100" id="progress"></progress>
        <noscript>JavaScript is disabled. Please enable JavaScript to run Briarthorn.</noscript>
      </div>
      <div id="screen"></div>
    </div>
    <div class="controls">
      <!-- requestFullscreen rejects when the browser denies it (e.g. not a
           user gesture); swallow that instead of surfacing a page error. Either
           way hand focus (and with it the keyboard) back to the game — the
           granted case also refocuses via fullscreenchange, harmlessly twice. -->
      <input type="button" value="Fullscreen" onclick="document.getElementById('view').requestFullscreen().catch(() => {}).finally(() => focusGame())">
    </div>

    <script type="text/javascript">
      const loaderElement = document.getElementById('loader');
      const statusElement = document.getElementById('status');
      const progressElement = document.getElementById('progress');
      const screenElement = document.getElementById('screen');

      // Whether the app has come up: once it has, page-level errors must not
      // swap the running app back out for the loader overlay.
      let appLoaded = false;

      function setStatus(text) {
        statusElement.innerHTML = text;
      }

      function showApp() {
        appLoaded = true;
        loaderElement.style.display = 'none';
        screenElement.style.display = 'block';
        focusGameWhenReady();
      }

      // Route keyboard input to the game. Qt for WebAssembly delivers key events
      // through an invisible focus-helper element inside each window's DOM (its
      // keydown/keyup listeners sit on the window element above it), so the game
      // only hears the keyboard while that helper has DOM focus. Qt focuses it
      // when the app window is clicked, but an embedded page starts with focus on
      // the body, and clicking page furniture (like the Fullscreen button) pulls
      // focus back out — so the shell pushes focus into the game at load and
      // whenever it drifts. The selectors reach through Qt's (open) shadow DOM
      // and are an internal detail of Qt 6's wasm platform (they also assume the
      // app's single window — with more windows, the active window's helper
      // would have to be picked instead of the first); if they miss, this
      // quietly does nothing and a click on the game still focuses it via Qt.
      //
      // Two guards mirror Qt's own focus behavior:
      // - focus already inside Qt's DOM is left alone (e.g. its hidden
      //   text-input element while a text field is focused — stealing focus
      //   onto the helper there would break text entry);
      // - a helper marked aria-hidden means browser accessibility is active and
      //   Qt routes focus through its accessibility tree instead (its own
      //   focus() refuses too) — forcing the helper would break screen readers.
      // preventScroll keeps the page (or an embedding iframe) from scroll-
      // jumping to the view on every restored focus.
      //
      // Returns whether the game holds focus afterwards — focus(), not element
      // presence: the helper exists before its window is shown, and focusing an
      // element under a display:none ancestor is a silent no-op.
      function focusGame() {
        const shadowRoot = screenElement.querySelector('#qt-shadow-container')?.shadowRoot;
        if (!shadowRoot)
          return false;
        if (shadowRoot.activeElement)
          return true; // the game already holds focus internally
        // Prefer the ACTIVE window's helper (Qt mirrors activation into an
        // "inactive" class on each decorated window; before any activation no
        // window carries it, and the plain selector is the fallback either
        // way) — with one window both selectors agree.
        const helper = shadowRoot.querySelector('.qt-decorated-window:not(.inactive) .qt-window-focus-helper')
          ?? shadowRoot.querySelector('.qt-window-focus-helper');
        if (!helper || helper.getAttribute('aria-hidden') === 'true')
          return false;
        helper.focus({ preventScroll: true });
        return shadowRoot.activeElement === helper;
      }

      // The app builds its window DOM after the runtime is up (onLoaded fires
      // before main() runs), so at showApp() time the focus helper does not
      // exist yet — retry across frames until focus actually lands, bounded by
      // wall clock so a failed load (or a Qt upgrade renaming the internals
      // focusGame relies on) does not poll forever. The give-up is loud: a
      // silent miss would ship a keyboard-dead page, because Qt only restores
      // focus itself when its focus object changes — not when a click lands on
      // the already-focused scene.
      function focusGameWhenReady(deadline = performance.now() + 15000) {
        if (focusGame())
          return;
        if (performance.now() < deadline)
          requestAnimationFrame(() => focusGameWhenReady(deadline));
        else
          console.warn('briarthorn: could not hand keyboard focus to the game; click the game view to focus it');
      }

      // Leaving or entering fullscreen moves focus around the page; either way
      // the game keeps the keyboard.
      document.addEventListener('fullscreenchange', () => focusGame());

      // This page is a game shell: nothing on it needs the keyboard except the
      // game, so after any click, focus goes back to the game rather than
      // parking on the body and going keyboard-dead. This covers page furniture
      // (empty background; the button, whose own handlers still run first) and,
      // observed with Qt 6.11, clicks on the game itself: the browser blurs
      // Qt's focus helper on pointerdown and the wasm platform only restores it
      // when the app's focus object changes — not when the click lands on the
      // already-focused scene. Capture phase, because Qt's window element stops
      // the propagation of pointer events inside the view, so a bubble listener
      // here would never see them; the deferred focusGame then runs after Qt's
      // own focus routing, and its guards keep it hands-off when Qt routed
      // focus somewhere deliberate.
      document.addEventListener('pointerup', () => setTimeout(() => focusGame(), 0), true);

      function showLoader(status) {
        screenElement.style.display = 'none';
        loaderElement.style.display = 'flex';
        progressElement.hidden = true;
        setStatus(status);
      }

      // Fetch the wasm binary ourselves so the progress bar shows the real
      // download (it is by far the largest asset); the compiled module is then
      // handed to qtLoad via qt.module, so emscripten does not download it
      // again. Content-Length may be absent (or the compressed size under
      // gzip), so the percentage is clamped and the bar turns indeterminate
      // when no total is known.
      async function fetchWasmWithProgress(url) {
        const response = await fetch(url);
        if (!response.ok || !response.body) {
          throw new Error(`Failed to fetch ${url}: ${response.status}`);
        }

        const total = Number(response.headers.get('Content-Length')) || 0;
        if (total === 0) {
          progressElement.removeAttribute('value'); // indeterminate
        }

        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;
        for (;;) {
          const { done, value } = await reader.read();
          if (done) {
            break;
          }
          chunks.push(value);
          received += value.length;
          if (total > 0) {
            const percent = Math.min(100, Math.round((received / total) * 100));
            progressElement.value = percent;
            setStatus(`Downloading&hellip; ${percent}%`);
          }
        }

        const bytes = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.length;
        }
        return WebAssembly.compile(bytes.buffer);
      }

      window.onerror = window.onunhandledrejection = () => {
        // Before the app is up a page error means the load failed; after, the
        // app keeps running and the error is left to the JavaScript console.
        if (!appLoaded) {
          showLoader('Exception thrown, see JavaScript console');
        }
      };

      async function init() {
        // The qt config beyond `module`: the entry function emscripten's
        // MODULARIZE emits, the container div Qt maps to a QScreen (the app
        // renders inside it — the self-contained view), and the load/exit
        // hooks driving the overlay.
        const qt = {
          onLoaded: () => showApp(),
          onExit: (exitData) => {
            let status = 'Application exit';
            status += exitData.code !== undefined ? ` with code ${exitData.code}` : '';
            status += exitData.text !== undefined ? ` (${exitData.text})` : '';
            showLoader(status);
          },
          entryFunction: window.briarthorn_entry,
          containerElements: [screenElement],
        };

        try {
          try {
            qt.module = await fetchWasmWithProgress('briarthorn.wasm');
            progressElement.hidden = true;
            setStatus('Starting&hellip;');
          } catch (fetchError) {
            // Progress is cosmetic: fall back to letting emscripten fetch the
            // wasm itself rather than failing the page over it.
            console.warn('wasm prefetch failed, falling back to plain load:', fetchError);
            delete qt.module;
            progressElement.hidden = true;
            setStatus('Loading&hellip;');
          }

          await qtLoad({ qt });
        } catch (e) {
          console.error(e);
          console.error(e.stack);
          showLoader('Failed to start, see JavaScript console');
        }
      }
    </script>
    <script src="briarthorn.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>

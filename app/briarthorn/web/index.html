<!doctype html>
<!--
The briarthorn.game entry page for the WebAssembly build: qtLoad() maps the
#screen div to a QScreen, so the game renders self-contained in a bounded view.
Everything is inline; only the bundle's own js/wasm files are referenced, so the
installed web/ directory serves as-is.
-->
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- 1:1 CSS-pixel to Qt device-independent-pixel mapping on mobile. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>
    <!-- Tab icon as a data URI; source of truth: assets/icon/briarthorn.svg. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSI+DQogIDxjaXJjbGUgY3g9IjMyIiBjeT0iMzIiIHI9IjMwIiBmaWxsPSIjMGQxODIwIiBzdHJva2U9IiMzZmI4YjMiIHN0cm9rZS13aWR0aD0iMiIvPg0KICA8Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjM2ZiOGIzIiBzdHJva2Utd2lkdGg9IjEiIG9wYWNpdHk9IjAuNSIvPg0KICA8Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIxMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjM2ZiOGIzIiBzdHJva2Utd2lkdGg9IjEiIG9wYWNpdHk9IjAuNCIvPg0KICA8cGF0aCBkPSJNMzIgMTYgTDMyIDQ4IE0xNiAzMiBMNDggMzIiIHN0cm9rZT0iIzNmYjhiMyIgc3Ryb2tlLXdpZHRoPSIwLjc1IiBvcGFjaXR5PSIwLjM1Ii8+DQogIDxwYXRoIGQ9Ik0zMiAyMiBMNDAgNDQgTDMyIDM4IEwyNCA0NCBaIiBmaWxsPSIjM2ZiOGIzIi8+DQo8L3N2Zz4NCg==">
    <title>Briarthorn</title>
    <style>
      /* Palette mirrors https://briarthorn.game/ (dark theme, teal accent). */
      :root {
        color-scheme: dark;
        --bg: #0b141b;          /* page background        */
        --bg-deep: #050a0f;     /* deepest surface        */
        --surface: #152029;     /* elevated surface       */
        --border: #243641;      /* hairline borders       */
        --text: #e6edee;        /* primary text           */
        --text-muted: #95a4ad;  /* secondary text         */
        --accent: #3fb8b3;      /* teal primary accent    */
        --accent-ink: #06181a;  /* text on the teal accent*/
      }

      body {
        margin: 0;
        padding: 16px;
        background-color: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      /* The game view: a bordered 4:3 surface; the app (maximized on wasm)
         fills the #screen container inside it exactly. */
      .view {
        position: relative;
        max-width: 1024px;
        aspect-ratio: 4 / 3;
        margin: 0 auto;
        border: 1px solid var(--border);
        background: var(--bg-deep);
      }
      /* Fullscreen drops the frame; Qt follows the container size automatically. */
      .view:fullscreen {
        max-width: none;
        aspect-ratio: auto;
        border: none;
      }
      #screen { display: none; width: 100%; height: 100%; }

      /* The loading overlay, centered in the view until the app is up. */
      #loader {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
      }
      #loader strong { color: var(--accent); }
      #status { color: var(--text-muted); }
      #progress { accent-color: var(--accent); width: 60%; max-width: 420px; }

      .spinner {
        height: 50px;
        width: 50px;
        animation: rotation 0.8s linear infinite;
        border-left: 6px solid var(--accent);
        border-right: 6px solid var(--accent);
        border-bottom: 6px solid var(--accent);
        border-top: 6px solid var(--border);
        border-radius: 100%;
        background-color: transparent;
      }
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Site-style primary button for the Fullscreen control. */
      .controls { text-align: center; margin-top: 12px; }
      input[type="button"] {
        background: var(--accent);
        color: var(--accent-ink);
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 6px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      input[type="button"]:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body onload="init()">
    <div class="view" id="view">
      <div id="loader">
        <div class="spinner"></div>
        <strong>Briarthorn</strong>
        <div id="status">Downloading&hellip;</div>
        <progress value="0" max="100" id="progress"></progress>
        <noscript>JavaScript is disabled. Please enable JavaScript to run Briarthorn.</noscript>
      </div>
      <div id="screen"></div>
    </div>
    <div class="controls">
      <!-- Swallow the rejection when the browser denies fullscreen, and either
           way hand keyboard focus back to the game. -->
      <input type="button" value="Fullscreen" onclick="document.getElementById('view').requestFullscreen().catch(() => {}).finally(() => focusGame())">
    </div>

    <script type="text/javascript">
      const loaderElement = document.getElementById('loader');
      const statusElement = document.getElementById('status');
      const progressElement = document.getElementById('progress');
      const screenElement = document.getElementById('screen');

      // Once the app is up, page-level errors must not swap it out for the loader.
      let appLoaded = false;

      function setStatus(text) {
        statusElement.innerHTML = text;
      }

      function showApp() {
        appLoaded = true;
        loaderElement.style.display = 'none';
        screenElement.style.display = 'block';
        focusGameWhenReady();
      }

      // Route the keyboard to the game: Qt wasm only delivers key events while its
      // invisible focus helper (inside the shadow DOM, an internal detail of Qt 6)
      // holds DOM focus, so push focus there whenever it drifts to the page. Guards
      // mirror Qt's own focus(): leave focus already inside Qt's DOM alone, and skip
      // an aria-hidden helper (accessibility active — Qt owns focus routing then).
      // Returns whether the game holds focus afterwards, checked via focus() rather
      // than element presence (focusing under a display:none ancestor is a no-op).
      function focusGame() {
        const shadowRoot = screenElement.querySelector('#qt-shadow-container')?.shadowRoot;
        if (!shadowRoot)
          return false;
        if (shadowRoot.activeElement)
          return true; // the game already holds focus internally
        // Prefer the active window's helper; with one window both selectors agree.
        const helper = shadowRoot.querySelector('.qt-decorated-window:not(.inactive) .qt-window-focus-helper')
          ?? shadowRoot.querySelector('.qt-window-focus-helper');
        if (!helper || helper.getAttribute('aria-hidden') === 'true')
          return false;
        helper.focus({ preventScroll: true });
        return shadowRoot.activeElement === helper;
      }

      // The window DOM (and its focus helper) only exists after main() runs, so
      // retry across frames until focus lands, bounded so a failed load or a Qt
      // upgrade renaming the internals does not poll forever.
      function focusGameWhenReady(deadline = performance.now() + 15000) {
        if (focusGame())
          return;
        if (performance.now() < deadline)
          requestAnimationFrame(() => focusGameWhenReady(deadline));
        else
          console.warn('briarthorn: could not hand keyboard focus to the game; click the game view to focus it');
      }

      // Fullscreen transitions move focus around; keep the keyboard on the game.
      document.addEventListener('fullscreenchange', () => focusGame());

      // Nothing on this page needs the keyboard except the game, so refocus it
      // after any click — including clicks on the game itself, which Qt 6.11 does
      // not refocus. Capture phase is required (Qt stops pointer-event propagation)
      // and the deferral runs after Qt's own focus routing.
      document.addEventListener('pointerup', () => setTimeout(() => focusGame(), 0), true);

      function showLoader(status) {
        screenElement.style.display = 'none';
        loaderElement.style.display = 'flex';
        progressElement.hidden = true;
        setStatus(status);
      }

      // Fetch the wasm ourselves so the progress bar shows the real download; the
      // compiled module goes to qtLoad via qt.module, so emscripten does not
      // re-download it. Indeterminate when Content-Length is absent.
      async function fetchWasmWithProgress(url) {
        const response = await fetch(url);
        if (!response.ok || !response.body) {
          throw new Error(`Failed to fetch ${url}: ${response.status}`);
        }

        const total = Number(response.headers.get('Content-Length')) || 0;
        if (total === 0) {
          progressElement.removeAttribute('value'); // indeterminate
        }

        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;
        for (;;) {
          const { done, value } = await reader.read();
          if (done) {
            break;
          }
          chunks.push(value);
          received += value.length;
          if (total > 0) {
            const percent = Math.min(100, Math.round((received / total) * 100));
            progressElement.value = percent;
            setStatus(`Downloading&hellip; ${percent}%`);
          }
        }

        const bytes = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.length;
        }
        return WebAssembly.compile(bytes.buffer);
      }

      window.onerror = window.onunhandledrejection = () => {
        // Before the app is up a page error means the load failed; after, the app
        // keeps running and the error stays in the console.
        if (!appLoaded) {
          showLoader('Exception thrown, see JavaScript console');
        }
      };

      async function init() {
        // Entry function, the container div Qt renders into, and the overlay hooks.
        const qt = {
          onLoaded: () => showApp(),
          onExit: (exitData) => {
            let status = 'Application exit';
            status += exitData.code !== undefined ? ` with code ${exitData.code}` : '';
            status += exitData.text !== undefined ? ` (${exitData.text})` : '';
            showLoader(status);
          },
          entryFunction: window.briarthorn_entry,
          containerElements: [screenElement],
        };

        try {
          try {
            qt.module = await fetchWasmWithProgress('briarthorn.wasm');
            progressElement.hidden = true;
            setStatus('Starting&hellip;');
          } catch (fetchError) {
            // Progress is cosmetic: let emscripten fetch the wasm itself instead.
            console.warn('wasm prefetch failed, falling back to plain load:', fetchError);
            delete qt.module;
            progressElement.hidden = true;
            setStatus('Loading&hellip;');
          }

          await qtLoad({ qt });
        } catch (e) {
          console.error(e);
          console.error(e.stack);
          showLoader('Failed to start, see JavaScript console');
        }
      }
    </script>
    <script src="briarthorn.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>

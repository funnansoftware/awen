name: macos

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    strategy:
      matrix:
        include:
          - preset: macos-clang-release
            target: install

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: lukka/get-cmake@latest

      - uses: ./.github/actions/get-vcpkg

      # Prebuilt Qt (cached) instead of a vcpkg source build; vcpkg keeps
      # providing the non-Qt dependencies (SDL3, gtest), neither of which needs
      # the autotools the Qt source build used to pull in via brew.
      - uses: ./.github/actions/get-qt

      - name: install-tools
        run: |
          brew install llvm@21
          echo "/opt/homebrew/opt/llvm@21/bin" >> $GITHUB_PATH

      - name: cmake-configure
        run: cmake --preset ${{ matrix.preset }}

      - name: cmake-build
        run: cmake --build --preset ${{ matrix.preset }} --parallel $(( $(sysctl -n hw.logicalcpu) + 1 ))

      - name: cmake-test
        run: ctest --preset ${{ matrix.preset }} --parallel $(( $(sysctl -n hw.logicalcpu) + 1 ))

      - name: cmake-${{ matrix.target }}
        run: cmake --build --preset ${{ matrix.preset }} --target ${{ matrix.target }}
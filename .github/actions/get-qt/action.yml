name: Get Qt
description: Install the pinned prebuilt Qt kit (cached) and require it at configure time.

inputs:
  host:
    description: install-qt-action host platform; empty lets the action detect the runner OS.
    required: false
    default: ""
  target:
    description: install-qt-action target platform.
    required: false
    default: desktop
  arch:
    description: install-qt-action architecture; empty picks the action's default for the host.
    required: false
    default: ""
  extra:
    description: Extra aqtinstall arguments (e.g. --autodesktop for cross kits).
    required: false
    default: ""
  modules:
    # Add-on Qt modules the base kit omits. QtNetworkAuth + QtWebSockets back the
    # chat transport/OAuth; wasm overrides this to drop qtnetworkauth (no browser
    # loopback, and the wasm kit doesn't offer it).
    description: Space-separated Qt add-on modules to install alongside the base kit.
    required: false
    default: qtnetworkauth qtwebsockets
  install-deps:
    description: Let install-qt-action apt-install Qt's linux dependencies. Turn off in containers, where sudo is absent and the image already ships them.
    required: false
    default: "true"
  setup-python:
    description: Let install-qt-action provision Python. Turn off in containers to use the image's python3 + pip.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # .qt-version is the single pin all workflows share — a Qt bump is one-line
    # and rotates install-qt-action's cache key via its version input.
    # The merged extra string is trimmed here: install-qt-action splits it on
    # spaces without filtering, and a leading space becomes an empty aqt arg.
    - name: read-qt-version
      id: qt-version
      shell: bash
      run: |
        echo "version=$(tr -d ' \t\r\n' < .qt-version)" >> "$GITHUB_OUTPUT"
        extra="${{ inputs.extra }} --base https://download.qt.io"
        echo "extra=$(echo $extra)" >> "$GITHUB_OUTPUT"

    # --base pins the official download server: aqt's randomly-picked mirrors
    # intermittently miss Updates.xml/checksums, which failed whole CI runs.
    # aqtsource: Qt 6.11 changed the windows repository layout and no aqtinstall
    # release (<= 3.3.0) knows it; the fix (aqtinstall PR #1000) is only on
    # master, pinned here by SHA. Drop aqtsource once a release past 3.3.0 ships.
    - uses: jurplel/install-qt-action@v4
      with:
        aqtsource: git+https://github.com/miurahr/aqtinstall@bb57972a7a806eccb5cacc01b094982d1c1f725e
        version: ${{ steps.qt-version.outputs.version }}
        host: ${{ inputs.host }}
        target: ${{ inputs.target }}
        arch: ${{ inputs.arch }}
        modules: ${{ inputs.modules }}
        extra: ${{ steps.qt-version.outputs.extra }}
        cache: true
        install-deps: ${{ inputs.install-deps }}
        setup-python: ${{ inputs.setup-python }}

    # Pin the Qt source so a discovery regression fails the configure loudly
    # instead of silently falling back to a ~50 min vcpkg Qt build.
    - name: require-prebuilt-qt
      shell: bash
      run: echo "AWEN_QT=prebuilt" >> "$GITHUB_ENV"
